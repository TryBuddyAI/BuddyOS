name: BUDDY · auto-improve

# Every 30 minutes, an agent picks one open `auto-eligible` issue and
# implements it on a branch + opens a PR. Tier:green PRs auto-merge once
# CI passes (see auto-merge.yml). Tier:yellow waits for review.
#
# Disable: create .github/agent/PAUSED on main.
# Manual run: gh workflow run "BUDDY · auto-improve"
#
# Cost note: at 30-min cadence, expect ~$60-150/month of Anthropic spend
# if there's steady work in the queue. Most runs find nothing and exit
# cheaply (~$0.05).

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

# Don't pile up runs. If one is in flight, skip the next tick.
concurrency:
  group: buddy-auto-improve
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check kill switch
        id: paused
        run: |
          if [ -f .github/agent/PAUSED ]; then
            echo "result=true" >> $GITHUB_OUTPUT
            echo "::notice::auto-improve paused via .github/agent/PAUSED"
          else
            echo "result=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git author
        if: steps.paused.outputs.result == 'false'
        run: |
          git config user.name  "buddy-bot[bot]"
          git config user.email "287312519+TryBuddyAI@users.noreply.github.com"

      - uses: actions/setup-node@v4
        if: steps.paused.outputs.result == 'false'
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable
        if: steps.paused.outputs.result == 'false'

      - name: Install deps (apps/desktop + apps/site)
        if: steps.paused.outputs.result == 'false'
        run: |
          cd apps/desktop && npm ci --prefer-offline --no-audit
          cd ../site && npm ci --prefer-offline --no-audit

      - name: Run Claude improver
        if: steps.paused.outputs.result == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Diff-size + policy enforced via the prompt itself, but the
          # hard token cap is the real backstop.
          max_tokens: 200000
          allowed_tools: "Read,Write,Edit,Glob,Grep,Bash"
          prompt: |
            Read .github/agent/policy.md and .github/agent/improve.md and
            follow them exactly. The repo is TryBuddyAI/BuddyOS. The
            GitHub CLI is already authenticated via GITHUB_TOKEN.

            Pick one auto-eligible issue per the policy, implement the
            smallest possible fix, verify it compiles, open a PR. Then
            exit. One PR per run, no exceptions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

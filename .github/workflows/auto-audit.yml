name: BUDDY · auto-audit

# Daily audit pass. Opens up to 5 new issues labeled `auto-eligible`,
# which the improver workflow picks up on its 10-minute cycle.
#
# Disable: create the file .github/agent/PAUSED on main.
# Manual run: gh workflow run "BUDDY · auto-audit"
#
# Cost note: daily, ~$2-3 per run. ~$60-90/month.

on:
  schedule:
    # Daily at 09:00 UTC. Catches whatever shipped in the last 24 hours
    # plus anything that drifted from older fixes.
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: buddy-auto-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Check kill switch
        id: paused
        run: |
          if [ -f .github/agent/PAUSED ]; then
            echo "result=true" >> $GITHUB_OUTPUT
            echo "::notice::auto-audit paused via .github/agent/PAUSED"
          else
            echo "result=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Claude auditor
        if: steps.paused.outputs.result == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Hard cap so a runaway audit can't blow the budget.
          max_tokens: 250000
          # Allowed tools — read-only on the filesystem plus gh for issues.
          allowed_tools: "Read,Glob,Grep,Bash(gh issue list:*),Bash(gh issue create:*),Bash(gh issue view:*)"
          prompt: |
            Read .github/agent/policy.md and .github/agent/audit.md and follow
            them. The repo is TryBuddyAI/BuddyOS. The GitHub CLI is already
            authenticated to this repo via the GITHUB_TOKEN env var.

            Audit the codebase under apps/ and report up to 5 new
            auto-eligible issues. Exit cleanly when done.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
